services:
    mysql:
        image: mysql:8.4
        container_name: mysql_db
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: anmmt_db
            MYSQL_USER: sail
            MYSQL_PASSWORD: password
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-ppassword"]
            interval: 5s
            timeout: 5s
            retries: 20

volumes:
    mysql_data:
